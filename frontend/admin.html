<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SkillExchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="glass-navbar">
        <div class="nav-left">
            <h1 class="logo-text">Admin<span class="neon-text">Panel</span></h1>
        </div>
        <div class="nav-right">
            <button id="back-to-main-btn" class="outline-btn">Back to App</button>
        </div>
    </nav>

    <div class="admin-dashboard">
        <div class="stats-grid">
            <div class="stat-card glass-container">
                <h3>Total Users</h3>
                <div class="stat-number" id="total-users">0</div>
            </div>
            <div class="stat-card glass-container">
                <h3>Total Skills</h3>
                <div class="stat-number" id="total-skills">0</div>
            </div>
            <div class="stat-card glass-container">
                <h3>Total Requests</h3>
                <div class="stat-number" id="total-requests">0</div>
            </div>
            <div class="stat-card glass-container">
                <h3>Pending Requests</h3>
                <div class="stat-number" id="pending-requests">0</div>
            </div>
        </div>

        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="users">Users</button>
            <button class="tab-btn" data-tab="skills">Skills</button>
            <button class="tab-btn" data-tab="requests">Requests</button>
        </div>

        <div id="users-tab" class="tab-content">
            <h2>Users Management</h2>
            <div id="users-list" class="admin-table"></div>
        </div>

        <div id="skills-tab" class="tab-content hidden">
            <h2>Skills Management</h2>
            <div id="skills-list" class="admin-table"></div>
        </div>

        <div id="requests-tab" class="tab-content hidden">
            <h2>Requests Management</h2>
            <div id="requests-list" class="admin-table"></div>
        </div>
    </div>

    <script>
        // Check if user is logged in and is admin
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'index.html';
        }

        // Decode token to check role (simple check)
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'index.html';
            }
        } catch (error) {
            console.error('Invalid token');
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        // Admin panel functionality
        document.getElementById('back-to-main-btn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Tab switching
        const adminTabs = document.querySelectorAll('.tab-btn');
        const adminTabContents = document.querySelectorAll('.tab-content');

        adminTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                adminTabs.forEach(t => t.classList.remove('active'));
                adminTabContents.forEach(c => c.classList.add('hidden'));

                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                document.getElementById(`${tabName}-tab`).classList.remove('hidden');

                // Load data for the selected tab
                switch(tabName) {
                    case 'users': loadUsersTab(); break;
                    case 'skills': loadSkillsTab(); break;
                    case 'requests': loadRequestsTab(); break;
                }
            });
        });

        // Load admin stats
        async function loadAdminStats() {
            try {
                const [usersRes, skillsRes, requestsRes] = await Promise.all([
                    fetch('/api/admin/stats/users', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/admin/stats/skills', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/admin/stats/requests', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const users = await usersRes.json();
                const skills = await skillsRes.json();
                const requests = await requestsRes.json();

                document.getElementById('total-users').textContent = users.total || 0;
                document.getElementById('total-skills').textContent = skills.total || 0;
                document.getElementById('total-requests').textContent = requests.total || 0;
                document.getElementById('pending-requests').textContent = requests.pending || 0;
            } catch (error) {
                console.error('Error loading admin stats:', error);
            }
        }

        // Load users tab
        async function loadUsersTab() {
            try {
                const response = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const users = await response.json();
                renderUsersTable(users);
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        // Render users table
        function renderUsersTable(users) {
            const container = document.getElementById('users-list');
            container.innerHTML = '';

            if (users.length === 0) {
                container.innerHTML = '<p class="text-muted">No users found.</p>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'admin-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Skills</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');
            users.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.mobile || 'N/A'}</td>
                    <td>${user.skills.join(', ')}</td>
                    <td>
                        <button class="outline-btn outline-sm" onclick="deleteUser('${user._id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            container.appendChild(table);
        }

        // Load skills tab
        async function loadSkillsTab() {
            try {
                const response = await fetch('/api/admin/skills', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const skills = await response.json();
                renderSkillsTable(skills);
            } catch (error) {
                console.error('Error loading skills:', error);
            }
        }

        // Render skills table
        function renderSkillsTable(skills) {
            const container = document.getElementById('skills-list');
            container.innerHTML = '';

            if (skills.length === 0) {
                container.innerHTML = '<p class="text-muted">No skills found.</p>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'admin-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Skill</th>
                        <th>Teacher</th>
                        <th>Email</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');
            skills.forEach(skill => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${skill.skill}</td>
                    <td>${skill.user}</td>
                    <td>${skill.email}</td>
                    <td>${skill.desc || 'N/A'}</td>
                    <td>
                        <button class="outline-btn outline-sm" onclick="deleteSkill('${skill._id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            container.appendChild(table);
        }

        // Load requests tab
        async function loadRequestsTab() {
            try {
                const response = await fetch('/api/admin/requests', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const requests = await response.json();
                renderRequestsTable(requests);
            } catch (error) {
                console.error('Error loading requests:', error);
            }
        }

        // Render requests table
        function renderRequestsTable(requests) {
            const container = document.getElementById('requests-list');
            container.innerHTML = '';

            if (requests.length === 0) {
                container.innerHTML = '<p class="text-muted">No requests found.</p>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'admin-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Skill</th>
                        <th>Requester</th>
                        <th>Teacher</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');
            requests.forEach(request => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${request.skillName}</td>
                    <td>${request.requesterName}</td>
                    <td>${request.teacherName}</td>
                    <td><span class="badge ${request.status}">${request.status}</span></td>
                    <td>${request.date}</td>
                    <td>
                        ${request.status === 'pending' ? `
                            <button class="outline-btn outline-sm" onclick="adminProcessRequest('${request._id}', 'accepted')">Accept</button>
                            <button class="outline-btn outline-sm" onclick="adminProcessRequest('${request._id}', 'declined')">Decline</button>
                        ` : ''}
                        <button class="outline-btn outline-sm" onclick="deleteRequest('${request._id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            container.appendChild(table);
        }

        // Global functions for admin actions
        window.deleteUser = async (userId) => {
            if (!confirm('Are you sure you want to delete this user?')) return;
            try {
                await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadUsersTab();
                loadAdminStats();
            } catch (error) {
                alert('Error deleting user');
            }
        };

        window.deleteSkill = async (skillId) => {
            if (!confirm('Are you sure you want to delete this skill?')) return;
            try {
                await fetch(`/api/admin/skills/${skillId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadSkillsTab();
                loadAdminStats();
            } catch (error) {
                alert('Error deleting skill');
            }
        };

        window.adminProcessRequest = async (requestId, status) => {
            try {
                await fetch(`/api/admin/requests/${requestId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                loadRequestsTab();
                loadAdminStats();
            } catch (error) {
                alert('Error processing request');
            }
        };

        window.deleteRequest = async (requestId) => {
            if (!confirm('Are you sure you want to delete this request?')) return;
            try {
                await fetch(`/api/admin/requests/${requestId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadRequestsTab();
                loadAdminStats();
            } catch (error) {
                alert('Error deleting request');
            }
        };

        // Initialize admin panel
        loadAdminStats();
        loadUsersTab();
    </script>
</body>
</html>
